name: Build and Release Packages

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Generate version
        id: version
        run: echo "VERSION=$(date +'%Y.%m.%d').${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build API x64
        run: |
          dotnet publish Peach.Stack.API/Peach.Stack.API.csproj \
            -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true -o ./publish-api-x64
          cd publish-api-x64 && zip -r ../Peach.Stack.API-v${{ steps.version.outputs.VERSION }}-linux-x64.zip .

      - name: Build React App
        run: |
          cd Peach.Stack.App
          npm install
          npm run build
          cd dist && zip -r ../../Peach.Stack.App-v${{ steps.version.outputs.VERSION }}.zip .

      - name: Delete Previous GitHub Releases
        uses: actions/github-script@v8
        with:
          script: |
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            if (releases.length === 0) {
              core.info('No previous releases found.');
            }

            for (const release of releases) {
              core.info(`Deleting release ${release.tag_name} (#${release.id}).`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });

              if (release.tag_name) {
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `tags/${release.tag_name}`,
                  });
                  core.info(`Deleted tag ${release.tag_name}.`);
                } catch (error) {
                  if (error.status === 404) {
                    core.warning(`Tag ${release.tag_name} was already missing.`);
                  } else {
                    throw error;
                  }
                }
              }
            }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Peach.Stack v${{ steps.version.outputs.VERSION }}
          files: |
            Peach.Stack.API-v${{ steps.version.outputs.VERSION }}-linux-x64.zip
            Peach.Stack.App-v${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true

      - name: Upload API x64 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: api-x64
          path: Peach.Stack.API-v${{ steps.version.outputs.VERSION }}-linux-x64.zip

      - name: Upload App Artifact
        uses: actions/upload-artifact@v7
        with:
          name: app
          path: Peach.Stack.App-v${{ steps.version.outputs.VERSION }}.zip
