name: PR Validation

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - master
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build API
        run: dotnet build Peach.Stack.API/Peach.Stack.API.csproj -c Release

      - name: Run Tests
        run: dotnet test Peach.Stack.Test/Peach.Stack.Test.csproj -c Release --no-restore

      - name: Build React App
        run: |
          cd Peach.Stack.App
          npm install
          npm run build
